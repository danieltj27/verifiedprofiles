<dl>
	<dt><label for="group_verified">{{ lang( 'ACP_VERIFY_GROUP_LABEL' ) ~ lang( 'COLON' ) }}</label><br /><span>{{ lang( 'ACP_VERIFY_GROUP_DESCRIPTION' ) }}</span></dt>
	<dd>
		<label><input type="radio" class="radio" name="group_verified" value="1" id="group_verified_yes"{{ ( S_GROUP_VERIFIED ) ? ' checked="checked"' : '' }}/> {{ lang( 'YES' ) }}</label>
		<label><input type="radio" class="radio" name="group_verified" value="0" id="group_verified_no"{{ ( ! S_GROUP_VERIFIED ) ? ' checked="checked"' : '' }}/> {{ lang( 'NO' ) }}</label>
		{% if S_GROUP_VERIFIED %}
			<br /><br />
			<input type="submit" id="verify_existing_group_members" name="verify_existing_group_members" class="button2" value="{{ lang( 'ACP_VERIFY_EXISTING_GROUP_MEMBERS_BUTTON' ) }}" />
		{% endif %}
	</dd>
</dl>
